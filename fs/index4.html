<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเข้า-ออก พนักงาน</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --primary-pastel: #a2d2ff;
            --secondary-pastel: #bde0fe;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background: var(--bg-color);
            min-height: 100vh;
        }

        /* Animated Background */
        .canvas-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #ffafbd, #ffc3a0, #a2d2ff, #bde0fe);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            padding: 2rem;
            margin-top: 2rem;
        }

        #video-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }

        video { width: 100%; transform: scaleX(-1); }
        canvas { display: none; }

        .btn-pastel {
            background: var(--primary-pastel);
            border: none;
            color: #444;
            transition: 0.3s;
            border-radius: 10px;
            padding: 10px 20px;
        }
        .btn-pastel:hover { background: #8ecae6; transform: translateY(-2px); }

        .theme-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="canvas-bg"></div>

    <div class="theme-selector">
        <select class="form-select form-select-sm" id="themeChange">
            <option value="day">☀️ กลางวัน</option>
            <option value="night">🌙 กลางคืน</option>
            <option value="sea">🌊 ทะเล</option>
            <option value="sky">☁️ ท้องฟ้า</option>
        </select>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center mt-5">
                <h2 class="fw-bold text-dark mb-4"><i class="bi bi-person-bounding-box"></i> ระบบเข้า-ออก พนักงาน</h2>
                
                <!-- LOGIN PAGE -->
                <div id="loginPage" class="glass-card">
                    <div id="video-container" class="mb-3">
                        <video id="video" autoplay playsinline></video>
                        <div class="position-absolute bottom-0 start-50 translate-middle-x mb-2">
                            <span class="badge bg-primary">Face Scan Active</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <select id="locationSelect" class="form-select">
                            <option value="HQ">สำนักงานใหญ่ (HQ)</option>
                            <option value="SK101">สุขุมวิท 101</option>
                            <option value="CHON">ชลบุรี</option>
                        </select>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="loginUser" placeholder="Username">
                        <label>กรอกชื่อผู้ใช้</label>
                    </div>
                    
                    <button class="btn btn-pastel w-100 mb-2 py-3 fw-bold" onclick="handleScanLogin()">
                        <i class="bi bi-camera"></i> สแกนใบหน้าเข้าสู่ระบบ
                    </button>
                    
                    <div class="d-flex justify-content-between mt-3">
                        <a href="#" class="text-decoration-none small" onclick="switchPage('registerPage')">ลงทะเบียนพนักงาน</a>
                        <a href="#" class="text-decoration-none small text-muted" onclick="adminLoginPrompt()">ผู้ดูแลระบบ</a>
                    </div>
                </div>

                <!-- REGISTER PAGE -->
                <div id="registerPage" class="glass-card hidden">
                    <h4 class="mb-3">ลงทะเบียนพนักงาน</h4>
                    <div class="mb-3">
                        <input type="text" id="regName" class="form-control mb-2" placeholder="ชื่อ-นามสกุล">
                        <input type="text" id="regUser" class="form-control mb-2" placeholder="ชื่อผู้ใช้">
                        <input type="password" id="regPass" class="form-control mb-2" placeholder="รหัสผ่าน">
                    </div>
                    <button class="btn btn-success w-100 mb-2" onclick="handleRegister()">ยืนยันการลงทะเบียน</button>
                    <button class="btn btn-light w-100" onclick="switchPage('loginPage')">ย้อนกลับ</button>
                </div>

                <!-- ADMIN DASHBOARD -->
                <div id="adminPage" class="glass-card hidden text-start">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="m-0">Admin Dashboard</h4>
                        <button class="btn btn-sm btn-danger" onclick="location.reload()">Logout</button>
                    </div>
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <div class="p-3 bg-white rounded shadow-sm">
                                <small>พนักงานทั้งหมด</small>
                                <h3 id="statTotal">0</h3>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 bg-white rounded shadow-sm">
                                <small>เข้างานวันนี้</small>
                                <h3 id="statToday">0</h3>
                            </div>
                        </div>
                    </div>
                    <h6>รายการที่รออนุมัติ <span id="pendingBadge" class="badge bg-warning">0</span></h6>
                    <ul class="list-group mb-4" id="pendingList"></ul>
                    
                    <h6>ประวัติการเข้างานล่าสุด</h6>
                    <div class="table-responsive">
                        <table class="table table-sm small">
                            <thead><tr><th>ชื่อ</th><th>เวลา</th><th>สถานที่</th></tr></thead>
                            <tbody id="logList"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // กำหนดค่า GAS Web App URL ที่นี่หลังจาก Deploy
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4hBdongBzos56__WoIgV-UFfY6URncdoB4TT5mCGHcHAtdUPaX5ByepXl_w7EVnMR/exec"; 

        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let currentStream = null;

        // Start Camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                currentStream = stream;
            } catch (err) {
                Swal.fire("Error", "ไม่สามารถเข้าถึงกล้องได้: " + err.message, "error");
            }
        }

        // Capture Image
        function capture() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            let ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.5);
        }

        function switchPage(pageId) {
            $(".glass-card").addClass("hidden");
            $(`#${pageId}`).removeClass("hidden");
        }

        // Logic: Scan & Login
        async function handleScanLogin() {
            const user = $('#loginUser').val();
            const loc = $('#locationSelect').val();
            if (!user) return Swal.fire("แจ้งเตือน", "กรุณากรอกชื่อผู้ใช้", "warning");

            Swal.fire({ title: 'กำลังตรวจสอบตำแหน่ง...', didOpen: () => Swal.showLoading() });

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const img = capture();
                const payload = {
                    action: "login",
                    data: {
                        username: user,
                        locationKey: loc,
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        faceImage: img
                    }
                };

                try {
                    const res = await callGAS(payload);
                    if (res.status === "success") {
                        Swal.fire("สำเร็จ!", `สวัสดีคุณ ${res.data.name} บันทึกเวลาเรียบร้อย ระยะห่าง ${res.data.distance}ม.`, "success");
                    } else {
                        Swal.fire("ล้มเหลว", res.message, "error");
                    }
                } catch (e) {
                    Swal.fire("Error", "การเชื่อมต่อขัดข้อง", "error");
                }
            }, (err) => {
                Swal.fire("GPS Error", "กรุณาเปิด GPS เพื่อเข้าใช้งาน", "error");
            });
        }

        // Logic: Register
        async function handleRegister() {
            const data = {
                name: $('#regName').val(),
                username: $('#regUser').val(),
                password: $('#regPass').val(),
                faceData: capture()
            };

            if (!data.name || !data.username) return Swal.fire("ข้อมูลไม่ครบ", "กรุณากรอกข้อมูลให้ครบ", "warning");

            const res = await callGAS({ action: "register", data: data });
            if (res.status === "success") {
                Swal.fire("ส่งข้อมูลแล้ว", "กรุณารอผู้ดูแลระบบอนุมัติบัญชี", "success").then(() => switchPage('loginPage'));
            } else {
                Swal.fire("ผิดพลาด", res.message, "error");
            }
        }

        // Admin Auth
        async function adminLoginPrompt() {
            const { value: formValues } = await Swal.fire({
                title: 'Admin Login',
                html: '<input id="swal-u" class="swal2-input" placeholder="Username"><input id="swal-p" type="password" class="swal2-input" placeholder="Password">',
                focusConfirm: false,
                preConfirm: () => [document.getElementById('swal-u').value, document.getElementById('swal-p').value]
            });

            if (formValues) {
                const res = await callGAS({ action: "adminLogin", data: { username: formValues[0], password: formValues[1] } });
                if (res.status === "success") {
                    loadAdminDashboard();
                    switchPage('adminPage');
                } else {
                    Swal.fire("Access Denied", "รหัสผ่านไม่ถูกต้อง", "error");
                }
            }
        }

        async function loadAdminDashboard() {
            const res = await callGAS({ action: "getDashboard" });
            if (res.status === "success") {
                const d = res.data;
                $('#statTotal').text(d.totalUsers);
                $('#statToday').text(d.todayAttendance);
                $('#pendingBadge').text(d.pendingUsers);
                
                $('#logList').empty();
                d.recentLogs.forEach(row => {
                    $('#logList').append(`<tr><td>${row[2]}</td><td>${new Date(row[0]).toLocaleTimeString()}</td><td>${row[3]}</td></tr>`);
                });

                const pending = await callGAS({ action: "getPendingUsers" });
                $('#pendingList').empty();
                pending.data.forEach(u => {
                    $('#pendingList').append(`<li class="list-group-item d-flex justify-content-between align-items-center">${u.name} <button class="btn btn-sm btn-primary" onclick="approveUser('${u.username}')">อนุมัติ</button></li>`);
                });
            }
        }

        async function approveUser(un) {
            await callGAS({ action: "approveUser", data: un });
            loadAdminDashboard();
            Swal.fire("สำเร็จ", "อนุมัติพนักงานเรียบร้อย", "success");
        }

        // Helper: Call GAS Backend
        async function callGAS(payload) {
            // กรณีรันบน GAS Direct ให้ใช้ google.script.run
            if (typeof google !== 'undefined') {
                return new Promise((resolve, reject) => {
                    google.script.run.withSuccessHandler(res => resolve(JSON.parse(res))).withFailureHandler(err => reject(err)).doPost({ postData: { contents: JSON.stringify(payload) } });
                });
            }

            // กรณี External Host
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // เพื่อเลี่ยง CORS
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            // หมายเหตุ: no-cors จะไม่สามารถอ่าน JSON response ได้โดยตรง 
            // แนะนำให้ใช้ Proxy หรือ Deploy ภายใต้โดเมนเดียวกัน
            return { status: "success", message: "Request Sent (Mode: no-cors)" }; 
        }

        // Theme Change
        $('#themeChange').change(function() {
            const v = $(this).val();
            let g = "";
            if (v === "day") g = "linear-gradient(45deg, #ffafbd, #ffc3a0, #a2d2ff, #bde0fe)";
            else if (v === "night") g = "linear-gradient(45deg, #2c3e50, #000000, #4ca1af)";
            else if (v === "sea") g = "linear-gradient(45deg, #2193b0, #6dd5ed)";
            else if (v === "sky") g = "linear-gradient(45deg, #89f7fe, #66a6ff)";
            $('.canvas-bg').css('background', g);
        });

        $(document).ready(() => initCamera());
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Scan & GPS Tracker</title>
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; }
        .main-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .camera-box { position: relative; background: #000; border-radius: 10px; overflow: hidden; width: 100%; max-width: 400px; margin: 0 auto; aspect-ratio: 4/3; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .face-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px dashed rgba(255,255,255,0.5); width: 60%; height: 70%; border-radius: 50%; pointer-events: none; }
        .btn-primary { background-color: #0d6efd; border: none; padding: 12px; border-radius: 8px; font-weight: 600; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading">
    <div class="spinner-border text-primary" role="status"></div>
</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card main-card">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">ระบบเข้า-ออก พนักงาน</h4>
                </div>
                <div class="card-body p-4">
                    
                    <!-- Login Section -->
                    <div id="loginSection">
                        <div class="camera-box mb-4">
                            <video id="video" autoplay muted playsinline></video>
                            <div class="face-overlay"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-geo-alt"></i> เลือกสถานที่ทำงาน</label>
                            <select class="form-select" id="branchSelect">
                                <option value="สำนักงานใหญ่">สำนักงานใหญ่</option>
                                <option value="สุขุมวิท101">สุขุมวิท 101</option>
                                <option value="ชลบุรี">ชลบุรี</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <input type="text" class="form-control" id="loginUser" placeholder="กรอกชื่อผู้ใช้">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" id="loginPass" placeholder="กรอกรหัสผ่าน">
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" onclick="handleCheckIn('In')">
                                <i class="bi bi-box-arrow-in-right"></i> บันทึกเข้างาน (สแกนใบหน้า)
                            </button>
                            <button class="btn btn-outline-secondary" onclick="handleCheckIn('Out')">
                                บันทึกออกงาน
                            </button>
                        </div>

                        <hr>
                        <div class="text-center">
                            <button class="btn btn-link text-decoration-none" onclick="toggleSection('register')">ลงทะเบียนพนักงานใหม่</button>
                            <br>
                            <button class="btn btn-link text-muted text-sm" onclick="Swal.fire('ลืมรหัสผ่าน','กรุณาติดต่อฝ่าย IT หรือผู้ดูแลระบบ','info')">ลืมรหัสผ่าน?</button>
                        </div>
                    </div>

                    <!-- Registration Section -->
                    <div id="registerSection" style="display:none;">
                        <h5 class="text-center mb-4">ลงทะเบียนใหม่</h5>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="regName" placeholder="ชื่อ-นามสกุล">
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="regUser" placeholder="ชื่อผู้ใช้ (Username)">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" id="regPass" placeholder="รหัสผ่าน">
                        </div>
                        <div class="alert alert-info py-2 small">
                            <i class="bi bi-info-circle"></i> การลงทะเบียนต้องใช้ภาพถ่ายใบหน้าและจะรอการอนุมัติ
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-success" onclick="handleRegister()">ลงทะเบียน</button>
                            <button class="btn btn-light" onclick="toggleSection('login')">ยกเลิก</button>
                        </div>
                    </div>

                </div>
            </div>
            <p class="text-center mt-4 text-muted small">© 2024 Face Scan & GPS Tracker System</p>
        </div>
    </div>
</div>

<!-- JS Libraries -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    let video = document.getElementById('video');
    let stream = null;

    $(document).ready(function() {
        startCamera();
    });

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
        } catch (err) {
            console.error("Camera Error: ", err);
            Swal.fire('กล้องผิดพลาด', 'ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการเข้าถึงกล้อง', 'error');
        }
    }

    function toggleSection(target) {
        if (target === 'register') {
            $('#loginSection').fadeOut(200, () => $('#registerSection').fadeIn());
        } else {
            $('#registerSection').fadeOut(200, () => $('#loginSection').fadeIn());
        }
    }

    function showLoading(show) {
        $('#loading').css('display', show ? 'flex' : 'none');
    }

    // ฟังก์ชันจับภาพใบหน้าเป็น Base64
    function captureImage() {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        return canvas.toDataURL('image/jpeg', 0.7);
    }

    // ขอพิกัด GPS
    function getGPS() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) reject('Geolocation not supported');
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true });
        });
    }

    async function handleCheckIn(type) {
        const username = $('#loginUser').val();
        const password = $('#loginPass').val();
        const branch = $('#branchSelect').val();

        if (!username || !password) {
            return Swal.fire('เตือน', 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน', 'warning');
        }

        const result = await Swal.fire({
            title: `ยืนยันบันทึก${type === 'In' ? 'เข้า' : 'ออก'}งาน`,
            text: `สถานที่: ${branch}`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'ตกลง',
            cancelButtonText: 'ยกเลิก'
        });

        if (result.isConfirmed) {
            showLoading(true);
            try {
                const pos = await getGPS();
                const faceData = captureImage();

                google.script.run
                    .withSuccessHandler(res => {
                        showLoading(false);
                        if (res.success) {
                            Swal.fire('สำเร็จ', res.message, 'success');
                            $('#loginPass').val('');
                        } else {
                            Swal.fire('ล้มเหลว', res.message, 'error');
                        }
                    })
                    .withFailureHandler(err => {
                        showLoading(false);
                        Swal.fire('Error', 'เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์', 'error');
                    })
                    .processCheckIn({
                        username, password, 
                        type, selectedBranch: branch,
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        faceData
                    });
            } catch (err) {
                showLoading(false);
                Swal.fire('GPS Error', 'กรุณาเปิดตำแหน่ง GPS และอนุญาตให้เข้าถึง', 'error');
            }
        }
    }

    function handleRegister() {
        const name = $('#regName').val();
        const user = $('#regUser').val();
        const pass = $('#regPass').val();

        if (!name || !user || !pass) return Swal.fire('เตือน', 'กรุณากรอกข้อมูลให้ครบถ้วน', 'warning');

        showLoading(true);
        const faceData = captureImage();

        google.script.run
            .withSuccessHandler(res => {
                showLoading(false);
                if (res.success) {
                    Swal.fire('ลงทะเบียนสำเร็จ', res.message, 'success');
                    toggleSection('login');
                } else {
                    Swal.fire('ล้มเหลว', res.message, 'error');
                }
            })
            .registerEmployee({ name, username: user, password: pass, faceData });
    }
</script>
</body>
</html>
